<!-- Glyph sidebar -->
<section id="glyph-panel">

  <div id="container">

    <div id="glyph-grid">
      <div id="loading-msg">Loading font…</div>
    </div>
    <button id="randomize-btn">Randomize</button>

<!-- Preview -->
<main id="preview-area">
  <div id="preview-wrapper">
    <div id="no-glyph">Select a glyph to begin</div>
  </div>
  <span id="preview-hint"></span>
</main>

<!-- Controls -->
<aside id="controls">

  <div class="ctrl-section">
    <h3>Canvas Size</h3>
    <label class="ctrl-label">Aspect ratio</label>
    <select id="aspect-ratio">
      <option value="1:1">1:1 — Square</option>
      <option value="4:3">4:3 — Standard</option>
      <option value="3:2">3:2 — Classic</option>
      <option value="16:9">16:9 — Widescreen</option>
      <option value="9:16" selected>9:16 — Portrait / Story</option>
      <option value="4:5">4:5 — Portrait Post</option>
      <option value="2:3">2:3 — Portrait</option>
      <option value="3:4">3:4 — Portrait</option>
      <option value="A4">A4 — 210×297mm</option>
      <option value="Letter">Letter — 8.5×11in</option>
      <option value="custom">Custom…</option>
    </select>
    <div id="custom-dims">
      <input type="number" id="custom-w" placeholder="W" min="10" max="8000" value="800">
      <span>×</span>
      <input type="number" id="custom-h" placeholder="H" min="10" max="8000" value="600">
      <span class="custom-dims-unit">px</span>
    </div>
  </div>

  <div class="ctrl-section">
    <h3>Glyph Scale</h3>
    <div class="slider-row">
      <input type="range" id="scale-slider" min="200" max="400" value="200" step="1">
      <span id="scale-val">200%</span>
    </div>
    <label class="ctrl-label ctrl-label--hint">

  <div class="ctrl-section">
    <h3>Position</h3>
    <div id="pos-grid">
      <button class="pos-btn" data-pos="top-left">•</button>
      <button class="pos-btn" data-pos="top">•</button>
      <button class="pos-btn" data-pos="top-right">•</button>
      <button class="pos-btn" data-pos="left">•</button>
      <button class="pos-btn selected" data-pos="center">•</button>
      <button class="pos-btn" data-pos="right">•</button>
      <button class="pos-btn" data-pos="bottom-left">•</button>
      <button class="pos-btn" data-pos="bottom">•</button>
      <button class="pos-btn" data-pos="bottom-right">•</button>
    </div>

  <div class="ctrl-section">

  </div>

  <div class="ctrl-section">
    <div class="section-header">
      <h3>Color Scheme</h3>

    </div>
    <div id="scheme-grid"></div>

  <div class="ctrl-section">

      <option value="Grain-FilmTextures-01.jpg">Film Grain 01</option>

// ─── Textures ────────────────────────────────────────────────────────────────
const TEXTURES = Array.from({length: 13}, (_, i) =>

);
const textureImgCache = {};
const textureDataURICache = {};
const textureLoadPromises = {};

// Returns a promise that resolves once textureDataURICache[filename] is populated
// (or resolves to null if the fetch failed, e.g. blocked under file://).
function preloadTexture(filename) {
  if (!filename) return Promise.resolve(null);
  if (textureLoadPromises[filename]) return textureLoadPromises[filename];

  const img = new Image();
  img.src = `textures/${filename}`;
  textureImgCache[filename] = img;

  // XHR → Blob → data URI so the texture can be drawn to canvas without tainting it
  const promise = new Promise(resolve => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', `textures/${filename}`, true);
    xhr.responseType = 'blob';
    xhr.onload = () => {
      if (!xhr.response) { resolve(null); return; }
      const reader = new FileReader();
      reader.onload = e => {
        textureDataURICache[filename] = e.target.result;
        resolve(e.target.result);
      };
      reader.onerror = () => resolve(null);
      reader.readAsDataURL(xhr.response);
    };
    xhr.onerror = () => resolve(null);
    try { xhr.send(); } catch (e) { resolve(null); }
  });

  textureLoadPromises[filename] = promise;
  return promise;
}

function getTextureDataURI(filename) {
  if (textureDataURICache[filename]) return textureDataURICache[filename];
  const img = textureImgCache[filename];
  if (!img || !img.complete || !img.naturalWidth) return null;
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  c.getContext('2d').drawImage(img, 0, 0);
  try { return c.toDataURL('image/jpeg', 0.85); } catch (e) { return null; }
}

// ─── DOM refs ───────────────────────────────────────────────────────────────
const glyphGrid    = document.getElementById('glyph-grid');
const previewWrap  = document.getElementById('preview-wrapper');
const aspectSelect = document.getElementById('aspect-ratio');
const customDims   = document.getElementById('custom-dims');
const customW      = document.getElementById('custom-w');
const customH      = document.getElementById('custom-h');
const scaleSlider  = document.getElementById('scale-slider');
const scaleVal     = document.getElementById('scale-val');
const schemeGrid   = document.getElementById('scheme-grid');
const posButtons   = document.querySelectorAll('.pos-btn');

// ─── Aspect ratio map ───────────────────────────────────────────────────────
const ASPECT_PRESETS = {
  '1:1':    [1080, 1080],
  '4:3':    [1200, 900],
  '3:2':    [1200, 800],
  '16:9':   [1920, 1080],
  '9:16':   [1080, 1920],
  '4:5':    [1000, 1250],
  '2:3':    [800,  1200],
  '3:4':    [900,  1200],
  'A4':     [794,  1123],
  'Letter': [850,  1100],
};

// ─── Detect which characters have glyphs in the custom font ─────────────────
// Renders each char twice (with custom font vs. monospace fallback) and
// compares pixels — a difference means the custom font has that glyph.
const _scanCanvas = document.createElement('canvas');
_scanCanvas.width = _scanCanvas.height = 24;
const _scanCtx = _scanCanvas.getContext('2d');

function hasGlyph(char) {
  _scanCtx.clearRect(0, 0, 24, 24);
  _scanCtx.fillStyle = '#fff';
  _scanCtx.font = `18px "${FONT_FAMILY}", monospace`;
  _scanCtx.fillText(char, 2, 18);
  const a = _scanCtx.getImageData(0, 0, 24, 24).data;

  _scanCtx.clearRect(0, 0, 24, 24);
  _scanCtx.font = '18px monospace';
  _scanCtx.fillText(char, 2, 18);
  const b = _scanCtx.getImageData(0, 0, 24, 24).data;

  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return true;
  }
  return false;
}

// ─── Build glyph grid ───────────────────────────────────────────────────────
function buildGlyphGrid() {
  glyphGrid.innerHTML = '';
  state.glyphs = [];

  const ranges = [
    [0x21,   0x7E],   // printable ASCII
  ];

  for (const [start, end] of ranges) {
    for (let cp = start; cp <= end; cp++) {
      const char = String.fromCodePoint(cp);
      if (!hasGlyph(char)) continue;

      const name = `U+${cp.toString(16).toUpperCase().padStart(4, '0')}`;
      state.glyphs.push({ char, name });
      const idx = state.glyphs.length - 1;

      const btn = document.createElement('button');
      btn.className = 'glyph-btn';
      btn.title = name;
      btn.textContent = char;

      btn.addEventListener('click', () => selectGlyph(idx, btn));
      glyphGrid.appendChild(btn);
    }
  }

  if (state.glyphs.length === 0) {
    glyphGrid.innerHTML = '<div id="loading-msg">No glyphs found.</div>';
    return;
  }

  const firstBtn = glyphGrid.querySelector('.glyph-btn');
  if (firstBtn) selectGlyph(0, firstBtn);
}

// ─── Select glyph ───────────────────────────────────────────────────────────
function selectGlyph(idx, btn) {
  glyphGrid.querySelectorAll('.glyph-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.selectedGlyph = state.glyphs[idx];
  render();
}

// ─── Render preview ──────────────────────────────────────────────────────────
function render() {
  if (!state.selectedGlyph) return;
  const { canvasW, canvasH, scale, position, rotation, colorBg, colorFg } = state;
  const svg = buildSVG(canvasW, canvasH, scale, position, colorBg, colorFg, rotation);

  const old = previewWrap.querySelector('svg');
  const noGlyph = previewWrap.querySelector('#no-glyph');
  if (old) old.remove();
  if (noGlyph) noGlyph.remove();

  const wrapper = document.createElement('div');
  wrapper.innerHTML = svg;
  const svgEl = wrapper.firstElementChild;
  svgEl.id = 'preview-svg';
  svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  svgEl.style.maxWidth = '100%';
  svgEl.style.maxHeight = '100%';
  previewWrap.appendChild(svgEl);

  document.getElementById('preview-hint').textContent = `${canvasW} × ${canvasH}px`;
}

// ─── Ink metrics helpers ─────────────────────────────────────────────────────
// measureText() returns actual ink bounds — independent of canvas size.
function measureInk(char, fontSize) {
  _scanCtx.font = `${fontSize}px "${FONT_FAMILY}"`;
  _scanCtx.textAlign = 'left';
  _scanCtx.textBaseline = 'alphabetic';
  const m = _scanCtx.measureText(char);
  return {
    left:    m.actualBoundingBoxLeft,    // distance left of x to ink edge
    right:   m.actualBoundingBoxRight,   // distance right of x to ink edge
    ascent:  m.actualBoundingBoxAscent,  // distance above baseline to ink top
    descent: m.actualBoundingBoxDescent, // distance below baseline to ink bottom
  };
}

// Returns {x, y} baseline origin so the actual ink aligns to `position`.
// Use with text-anchor="start" / dominant-baseline="auto" (textAlign="left" / textBaseline="alphabetic").
function inkPosition(ink, W, H, position) {
  const x = position.includes('left')   ? ink.left
           : position.includes('right')  ? W - ink.right
           : W / 2 - (ink.right - ink.left) / 2;

  const y = position.includes('top')    ? ink.ascent
           : position.includes('bottom') ? H - ink.descent
           : H / 2 + (ink.ascent - ink.descent) / 2;

  return { x, y };
}

// ─── Build SVG string ────────────────────────────────────────────────────────
function buildSVG(W, H, scaleMultiplier, position, colorBg, colorFg, rotation = 0) {
  const char = state.selectedGlyph.char;
  const fontSize = Math.min(W, H) * scaleMultiplier;
  const ink = measureInk(char, fontSize);
  const { x, y } = inkPosition(ink, W, H, position);
  const esc = char.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Rotate around the ink center
  const cx = (x + (ink.right - ink.left) / 2).toFixed(2);
  const cy = (y + (ink.descent - ink.ascent) / 2).toFixed(2);
  const rotAttr = rotation ? ` transform="rotate(${rotation}, ${cx}, ${cy})"` : '';

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  <defs>
    <style>@font-face { font-family: '${FONT_FAMILY}'; src: url('PHSFloralSymbols-Regular.otf'); }</style>
    <clipPath id="rect-clip"><rect width="${W}" height="${H}"/></clipPath>
  </defs>
  <g style="isolation:isolate">
    <rect width="${W}" height="${H}" fill="${colorBg}"/>
    <g clip-path="url(#rect-clip)">
      <text x="${x.toFixed(2)}" y="${y.toFixed(2)}" font-family="'${FONT_FAMILY}'" font-size="${fontSize}"
            fill="${colorFg}" text-anchor="start" dominant-baseline="auto"${rotAttr}>${esc}</text>
    </g>
    ${state.texture ? `<image href="textures/${state.texture}" x="0" y="0" width="${W}" height="${H}" preserveAspectRatio="xMidYMid slice" style="opacity:0.15;mix-blend-mode:plus-darken"/>` : ''}
  </g>
</svg>`;
}

// ─── Build SVG with outlined paths (no font dependency) ──────────────────────
function buildSVGWithPaths(W, H, scaleMultiplier, position, colorBg, colorFg, rotation = 0) {
  const char = state.selectedGlyph.char;
  const fontSize = Math.min(W, H) * scaleMultiplier;
  const ink = measureInk(char, fontSize);
  const { x, y } = inkPosition(ink, W, H, position);

  const cx = (x + (ink.right - ink.left) / 2).toFixed(2);
  const cy = (y + (ink.descent - ink.ascent) / 2).toFixed(2);
  const rotAttr = rotation ? ` transform="rotate(${rotation}, ${cx}, ${cy})"` : '';

  const pathData = opentypeFont.getPath(char, x, y, fontSize).toPathData(2);
  const textureDataURI = state.texture ? getTextureDataURI(state.texture) : null;

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  <defs>
    <clipPath id="rect-clip"><rect width="${W}" height="${H}"/></clipPath>
  </defs>
  <g style="isolation:isolate">
    <rect width="${W}" height="${H}" fill="${colorBg}"/>
    <g clip-path="url(#rect-clip)">
      <path d="${pathData}" fill="${colorFg}"${rotAttr}/>
    </g>
    ${textureDataURI ? `<image href="${textureDataURI}" x="0" y="0" width="${W}" height="${H}" preserveAspectRatio="xMidYMid slice" style="opacity:0.2;mix-blend-mode:plus-darken"/>` : ''}
  </g>
</svg>`;
}

// ─── Export SVG ──────────────────────────────────────────────────────────────
document.getElementById('export-svg').addEventListener('click', () => {
  if (!state.selectedGlyph) return;
  const { canvasW, canvasH, scale, position, rotation, colorBg, colorFg } = state;
  const svg = opentypeFont
    ? buildSVGWithPaths(canvasW, canvasH, scale, position, colorBg, colorFg, rotation)
    : buildSVG(canvasW, canvasH, scale, position, colorBg, colorFg, rotation);
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `shape-template-${state.selectedGlyph.name}.svg`;
  a.click();
});

// ─── Export PNG ──────────────────────────────────────────────────────────────
async function loadTexturesFromDirectory() {
  if (!window.showDirectoryPicker) return;
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
    for await (const [name, handle] of dirHandle.entries()) {
      if (handle.kind !== 'file' || !name.match(/\.(jpe?g|png)$/i)) continue;
      try {
        const file = await handle.getFile();
        const buf = await file.arrayBuffer();
        const blob = new Blob([buf], { type: file.type || 'image/jpeg' });
        await new Promise(resolve => {
          const r = new FileReader();
          r.onload = e => { textureDataURICache[name] = e.target.result; resolve(); };
          r.readAsDataURL(blob);
        });
      } catch (e) {}
    }
  } catch (e) {} // user cancelled
}

document.getElementById('export-png').addEventListener('click', async () => {
  if (!state.selectedGlyph) return;

  // Wait for the same-origin fetch to finish caching the texture as a data URI —
  // this completes automatically when hosted (e.g. GitHub Pages). Only fall back
  // to asking for folder access if that fetch genuinely failed (e.g. file://).
  if (state.texture) {
    await preloadTexture(state.texture);
  }
  if (state.texture && !textureDataURICache[state.texture]) {
    await loadTexturesFromDirectory();
  }

  const pxScale = parseInt(document.getElementById('png-scale').value);
  const { canvasW, canvasH, scale, position, colorBg, colorFg } = state;
  const W2 = canvasW * pxScale;
  const H2 = canvasH * pxScale;
  const fontSize = Math.min(W2, H2) * scale;

  const canvas = document.createElement('canvas');
  canvas.width = W2; canvas.height = H2;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = colorBg;
  ctx.fillRect(0, 0, W2, H2);

  const ink = measureInk(state.selectedGlyph.char, fontSize);
  const { x, y } = inkPosition(ink, W2, H2, position);
  ctx.font         = `${fontSize}px "${FONT_FAMILY}"`;
  ctx.fillStyle    = colorFg;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'alphabetic';

  const rotRad = (state.rotation || 0) * Math.PI / 180;
  const inkCx = x + (ink.right - ink.left) / 2;
  const inkCy = y + (ink.descent - ink.ascent) / 2;
  ctx.save();
  ctx.translate(inkCx, inkCy);
  ctx.rotate(rotRad);
  ctx.translate(-inkCx, -inkCy);
  ctx.fillText(state.selectedGlyph.char, x, y);
  ctx.restore();

  if (state.texture) {
    const dataURI = textureDataURICache[state.texture];
    if (dataURI) {
      // data URI doesn't taint the canvas — draw it directly
      const texImg = new Image();
      texImg.src = dataURI;
      await texImg.decode().catch(() => {});
      ctx.globalAlpha = 0.2;
      ctx.globalCompositeOperation = 'source-over';
      ctx.drawImage(texImg, 0, 0, W2, H2);
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    } else {
      // XHR not yet ready or blocked — try direct draw and catch taint error
      const tImg = textureImgCache[state.texture];
      if (tImg && tImg.complete && tImg.naturalWidth) {
        ctx.globalAlpha = 0.2;
        ctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(tImg, 0, 0, W2, H2);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
      }
    }
  }

  let pngDataURL;
  try {
    pngDataURL = canvas.toDataURL('image/png');
  } catch (e) {
    // Canvas tainted (Chrome file:// restriction) — re-render without texture
    const c2 = document.createElement('canvas');
    c2.width = W2; c2.height = H2;
    const ctx2 = c2.getContext('2d');
    ctx2.fillStyle = colorBg;
    ctx2.fillRect(0, 0, W2, H2);
    ctx2.font = `${fontSize}px "${FONT_FAMILY}"`;
    ctx2.fillStyle = colorFg;
    ctx2.textAlign = 'left';
    ctx2.textBaseline = 'alphabetic';
    ctx2.save();
    ctx2.translate(inkCx, inkCy);
    ctx2.rotate(rotRad);
    ctx2.translate(-inkCx, -inkCy);
    ctx2.fillText(state.selectedGlyph.char, x, y);
    ctx2.restore();
    pngDataURL = c2.toDataURL('image/png');
  }

  const a = document.createElement('a');
  a.href = pngDataURL;
  a.download = `shape-template-${state.selectedGlyph.name}@${pxScale}x.png`;
  a.click();
});

// ─── Aspect ratio ────────────────────────────────────────────────────────────
function applyAspect() {
  const val = aspectSelect.value;
  if (val === 'custom') {
    customDims.classList.add('visible');
    state.canvasW = parseInt(customW.value) || 800;
    state.canvasH = parseInt(customH.value) || 600;
  } else {
    customDims.classList.remove('visible');
    const [w, h] = ASPECT_PRESETS[val] || [1000, 1000];
    state.canvasW = w;
    state.canvasH = h;
  }
  render();
}

aspectSelect.addEventListener('change', applyAspect);
customW.addEventListener('input', () => { state.canvasW = parseInt(customW.value) || 800; render(); });
customH.addEventListener('input', () => { state.canvasH = parseInt(customH.value) || 600; render(); });

// ─── Scale slider ────────────────────────────────────────────────────────────
scaleSlider.addEventListener('input', () => {
  const pct = parseInt(scaleSlider.value);
  scaleVal.textContent = pct + '%';
  state.scale = pct / 100;
  render();
});

// ─── Position ────────────────────────────────────────────────────────────────
posButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    posButtons.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.position = btn.dataset.pos;
    render();
  });
});

// ─── Rotation slider ─────────────────────────────────────────────────────────
document.getElementById('rotation-slider').addEventListener('input', e => {
  state.rotation = parseInt(e.target.value);
  document.getElementById('rotation-val').textContent = state.rotation + '°';
  render();
});

// ─── Texture ─────────────────────────────────────────────────────────────────
document.getElementById('texture-select').addEventListener('change', e => {
  state.texture = e.target.value || null;
  if (state.texture) preloadTexture(state.texture);
  render();
});

// ─── Randomize ───────────────────────────────────────────────────────────────
const POSITIONS = ['top-left','top','top-right','left','center','right','bottom-left','bottom','bottom-right'];

document.getElementById('randomize-btn').addEventListener('click', () => {
  if (!state.glyphs.length) return;

  // Glyph
  const glyphIdx = Math.floor(Math.random() * state.glyphs.length);
  const glyphBtn = glyphGrid.querySelectorAll('.glyph-btn')[glyphIdx];
  selectGlyph(glyphIdx, glyphBtn);

  // Scale (200–400%)
  const pct = Math.round(Math.random() * 200 + 200);
  state.scale = pct / 100;
  scaleSlider.value = pct;
  scaleVal.textContent = pct + '%';

  // Position
  const pos = POSITIONS[Math.floor(Math.random() * POSITIONS.length)];
  state.position = pos;
  posButtons.forEach(b => b.classList.toggle('selected', b.dataset.pos === pos));

  // Rotation
  const rot = Math.floor(Math.random() * 360);
  state.rotation = rot;
  document.getElementById('rotation-slider').value = rot;
  document.getElementById('rotation-val').textContent = rot + '°';

  // Color scheme
  const schemeIdx = Math.floor(Math.random() * SCHEMES.length);
  const s = SCHEMES[schemeIdx];
  state.colorBg = s.bg;
  state.colorFg = s.fg;
  document.querySelectorAll('.scheme-btn').forEach((b, i) => b.classList.toggle('selected', i === schemeIdx));

  // Texture (50% chance of none, otherwise random)
  const textureVal = Math.random() < 0.5 ? '' : TEXTURES[Math.floor(Math.random() * TEXTURES.length)];
  state.texture = textureVal || null;
  document.getElementById('texture-select').value = textureVal;
  if (state.texture) preloadTexture(state.texture);

  render();
});

// ─── Color schemes ───────────────────────────────────────────────────────────
function buildSchemes() {
  SCHEMES.forEach((s, i) => {
    if (s.section) {
      const label = document.createElement('div');
      label.className = 'scheme-section-label' + (s.section.trim() === '' ? ' scheme-section-gap' : '');
      label.textContent = s.section;
      schemeGrid.appendChild(label);
    }
    const btn = document.createElement('button');
    btn.className = 'scheme-btn' + (i === 0 ? ' selected' : '');
    btn.title = s.name;
    btn.innerHTML = `<div class="scheme-inner">
      <div class="scheme-top" style="background:${s.bg}"></div>
      <div class="scheme-bottom" style="background:${s.fg}"></div>
    </div>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.colorBg = s.bg;
      state.colorFg = s.fg;
      render();
    });
    schemeGrid.appendChild(btn);
  });
}

document.getElementById('swap-colors').addEventListener('click', () => {
  [state.colorBg, state.colorFg] = [state.colorFg, state.colorBg];
  document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('selected'));
  render();
});

// ─── Init ────────────────────────────────────────────────────────────────────
buildSchemes();
applyAspect();
try {
  const bin = atob(FONT_B64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  opentypeFont = opentype.parse(buf.buffer);
} catch (e) {
  console.warn('opentype font parse failed:', e);
}
document.fonts.load(`1em "${FONT_FAMILY}"`).then(() => buildGlyphGrid());
</script>
